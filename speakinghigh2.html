<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Speaking Prep (Friendly Voice)</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --accent-color: #ff7675;
            --bg-color: #f9f9fb;
            --text-color: #2d3436;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--bg-color); margin: 0; color: var(--text-color); }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 450px; border: 1px solid #eee; }
        h2 { margin-top: 0; color: var(--primary-color); font-size: 1.5rem; }
        .status-box { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 1.5rem 0; }
        .status { font-size: 1.1rem; font-weight: 500; color: #636e72; }
        .recording { color: var(--accent-color); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        button { padding: 16px 40px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 50px; background-color: var(--primary-color); color: white; transition: all 0.3s ease; font-weight: bold; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }
        button:disabled { background-color: #dfe6e9; color: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }
        .result-container { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #f1f2f6; }
        .score-box { margin-bottom: 1rem; }
        .score-label { font-size: 0.9rem; color: #b2bec3; margin-bottom: 4px; display: block; }
        .score-circle { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 0 auto; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2); }
        .feedback { font-size: 0.95rem; line-height: 1.6; background: #f8f9fa; padding: 1rem; border-radius: 12px; text-align: left; margin-top: 1rem; }
        .target-txt { color: #00b894; font-weight: bold; }
        .user-txt { color: var(--primary-color); font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>TOEFL Listen & Repeat</h2>
    <p style="font-size: 0.9rem; color: #b2bec3;">6-8 Words Challenge</p>
    
    <div class="status-box">
        <div id="status" class="status">Press Start to Begin</div>
    </div>
    
    <button id="startBtn">Start Practice</button>
    
    <div id="resultArea" class="result-container" style="display:none;">
        <div class="score-box">
            <span class="score-label">Estimated Score</span>
            <div class="score-circle" id="scoreDisplay">--</div>
        </div>
        <div class="feedback">
            <strong>Target:</strong> <span id="correctText" class="target-txt"></span><br>
            <strong>You said:</strong> <span id="userSpeech" class="user-txt"></span>
        </div>
    </div>
</div>

<script>
    const QUESTIONS = [
    // --- 助動詞の完了形 (Modal + have done) ---
    "She must have known it.",
    "I should have studied more.",
    "He may have missed it.",
    "You needn't have worried.",

    // --- 分詞構文・付帯状況 (Participles) ---
    "Weather permitting, we'll go.",
    "With my eyes closed.",
    "Speaking of the project...",
    "The city lies ruined.",

    // --- 関係詞・接続詞 (Advanced Clauses) ---
    "That's the reason why.",
    "No matter what happens.",
    "Whoever wins is fine.",
    "The way it is now.",

    // --- 仮定法 (Subjunctive) ---
    "If I had known that.",
    "As if he were king.",
    "Were I in your place.",
    "It's time you went home.",

    // --- 強調・倒置・重要構文 (Specific Patterns) ---
    "Rarely does it rain here.",
    "Hardly had I arrived.",
    "The more, the better.",
    "What matters is your effort.",

    // --- 高度な動詞・形容詞 (Advanced Vocab) ---
    "This theory remains controversial.",
    "The plan proved successful.",
    "Don't take it for granted.",
    "Patience is essential here."
];

    const startBtn = document.getElementById('startBtn');
    const statusDisplay = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const userSpeechDisplay = document.getElementById('userSpeech');
    const correctTextDisplay = document.getElementById('correctText');

    let currentQuestion = "";
    let voices = [];

    // 音声リストを事前ロード
    function loadVoices() {
        voices = window.speechSynthesis.getVoices();
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    startBtn.addEventListener('click', () => {
        currentQuestion = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
        startBtn.disabled = true;
        resultArea.style.display = 'none';
        
        statusDisplay.innerText = "Please listen...";
        statusDisplay.className = "status";
        
        const utterance = new SpeechSynthesisUtterance(currentQuestion);
        
        // --- 優しい声の設定 ---
        // Googleの英語女性の声、またはAppleのSamanthaなど、自然なものを探す
        const preferredVoice = voices.find(v => v.name.includes('Google US English')) || 
                               voices.find(v => v.name.includes('Samantha')) ||
                               voices.find(v => v.lang.startsWith('en-'));
        
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.lang = 'en-US';
        utterance.pitch = 1.25; // 少し高めで明るいトーン
        utterance.rate = 0.85;  // 落ち着いた速度
        // -----------------------

        utterance.onend = () => {
            statusDisplay.innerText = "● Now Repeat!";
            statusDisplay.className = "status recording";
            recognition.start();
        };

        window.speechSynthesis.speak(utterance);
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        calculateScore(transcript);
    };

    recognition.onerror = () => {
        statusDisplay.innerText = "Error: Couldn't hear you.";
        startBtn.disabled = false;
    };

    function calculateScore(userText) {
        statusDisplay.innerText = "Result";
        statusDisplay.className = "status";
        startBtn.disabled = false;

        const target = currentQuestion.toLowerCase().replace(/[.!?,]/g, "");
        const user = userText.toLowerCase().replace(/[.!?,]/g, "");

        const targetWords = target.split(/\s+/);
        const userWords = user.split(/\s+/);
        
        let matches = 0;
        targetWords.forEach(w => {
            if(userWords.includes(w)) matches++;
        });

        const ratio = matches / targetWords.length;
        
        // 1.0 - 6.0 スケール
        let toeflScore = 1.0 + (ratio * 5.0);
        toeflScore = Math.min(6.0, Math.max(1.0, toeflScore));
        
        // 0.5刻みで表示
        const finalDisplayScore = (Math.round(toeflScore * 2) / 2).toFixed(1);

        scoreDisplay.innerText = finalDisplayScore;
        userSpeechDisplay.innerText = userText || "(No speech detected)";
        correctTextDisplay.innerText = currentQuestion;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
