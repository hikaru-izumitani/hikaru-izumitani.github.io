<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>TOEFL Prep - Select Level</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f9f9fb;
            --text-color: #2d3436;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            margin: 0; 
            color: var(--text-color); 
        }
        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 500px; 
        }
        h1 { color: var(--primary-color); margin-bottom: 2rem; }
        
        .menu-list {
            display: grid;
            gap: 15px;
            list-style: none;
            padding: 0;
        }
        .menu-item a {
            display: block;
            padding: 20px;
            background: white;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }
        .menu-item a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .level-tag {
            display: block;
            font-size: 0.8rem;
            color: #b2bec3;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
