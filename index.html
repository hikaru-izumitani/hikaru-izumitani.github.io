<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep - Select Level</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --accent-color: #ff7675;
            --bg-color: #f9f9fb;
            --text-color: #2d3436;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            margin: 0; 
            color: var(--text-color); 
        }
        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 500px; 
            padding: 2rem 0;
        }
        h1 { color: var(--primary-color); margin-bottom: 0.5rem; }
        .subtitle { color: #636e72; margin-bottom: 2rem; font-size: 0.9rem; }
        
        .menu-list {
            display: grid;
            gap: 12px;
            list-style: none;
            padding: 0;
        }
        .menu-item a {
            display: block;
            padding: 18px;
            background: white;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            border: 1px solid #eee;
        }
        .menu-item a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.15);
            border-color: var(--primary-color);
        }
        .level-tag {
            display: block;
            font-size: 0.75rem;
            color: #b2bec3;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 応用コース用の特別スタイル */
        .advanced a {
            border: 2px solid var(--accent-color);
            background: #fffafa;
        }
        .advanced a:hover {
            border-color: #d63031;
            background: #fff5f5;
        }
        .advanced .level-tag {
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Listen and Repeat</h1>
    <p class="subtitle">自分のレベルに合ったコースを選択してください</p>
    
    <div class="menu-list">
        <div class="menu-item"><a href="speakingchu3.html"><span class="level-tag">Junior High 3</span>中学3年生レベル</a></div>
        <div class="menu-item"><a href="speakinghigh1.html"><span class="level-tag">High School 1</span>高校1年生レベル</a></div>
        <div class="menu-item"><a href="speakinghigh2.html"><span class="level-tag">High School 2</span>高校2年生レベル</a></div>
        <div class="menu-item"><a href="speakinghigh3.html"><span class="level-tag">High School 3</span>高校3年生レベル</a></div>
        <div class="menu-item" style="margin-top: 10px;">
            <a href="speaking.html" style="background: #f1f2f6; border: none; font-size: 0.9rem;">
                標準コース (TOEFL)
            </a>
        </div>
        <div class="menu-item advanced">
            <a href="speaking3.html">
                <span class="level-tag">Advanced Challenge</span>
                🔥 応用コース (TOEFL)
            </a>
        </div>

        
    </div>
</div>

</body>
</html>
