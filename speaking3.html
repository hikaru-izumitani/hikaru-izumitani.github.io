<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Speaking Prep (Friendly Voice)</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --accent-color: #ff7675;
            --bg-color: #f9f9fb;
            --text-color: #2d3436;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--bg-color); margin: 0; color: var(--text-color); }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 450px; border: 1px solid #eee; }
        h2 { margin-top: 0; color: var(--primary-color); font-size: 1.5rem; }
        .status-box { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 1.5rem 0; }
        .status { font-size: 1.1rem; font-weight: 500; color: #636e72; }
        .recording { color: var(--accent-color); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        button { padding: 16px 40px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 50px; background-color: var(--primary-color); color: white; transition: all 0.3s ease; font-weight: bold; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }
        button:disabled { background-color: #dfe6e9; color: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }
        .result-container { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #f1f2f6; }
        .score-box { margin-bottom: 1rem; }
        .score-label { font-size: 0.9rem; color: #b2bec3; margin-bottom: 4px; display: block; }
        .score-circle { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 0 auto; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2); }
        .feedback { font-size: 0.95rem; line-height: 1.6; background: #f8f9fa; padding: 1rem; border-radius: 12px; text-align: left; margin-top: 1rem; }
        .target-txt { color: #00b894; font-weight: bold; }
        .user-txt { color: var(--primary-color); font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>TOEFL Listen & Repeat</h2>
    <p style="font-size: 0.9rem; color: #b2bec3;">6-8 Words Challenge</p>
    
    <div class="status-box">
        <div id="status" class="status">Press Start to Begin</div>
    </div>
    
    <button id="startBtn">Start Practice</button>
    
    <div id="resultArea" class="result-container" style="display:none;">
        <div class="score-box">
            <span class="score-label">Estimated Score</span>
            <div class="score-circle" id="scoreDisplay">--</div>
        </div>
        <div class="feedback">
            <strong>Target:</strong> <span id="correctText" class="target-txt"></span><br>
            <strong>You said:</strong> <span id="userSpeech" class="user-txt"></span>
        </div>
    </div>
</div>

<script>
    const QUESTIONS = [
    // --- 受動態 (Passive Voice) ---
    "The ancient city was destroyed by fire.",
    "Many species are threatened by climate change.",
    "Organic compounds are produced during the reaction.",
    "The lecture was attended by many students.",
    "New evidence was discovered in the desert.",

    // --- 現在完了・過去完了 (Perfect Tenses) ---
    "Scientists have developed a new solar cell.",
    "The population has grown rapidly since then.",
    "Architects had finished the design before June.",
    "She has studied the behavior of wolves.",
    "The researchers have published their final results.",

    // --- 比較級・最上級 (Comparisons) ---
    "This theory is more complex than expected.",
    "The ocean is deeper than we thought.",
    "Gold is one of the densest metals.",
    "Mammals are more adaptable than most reptiles.",
    "Jupiter is the largest planet in space.",

    // --- 関係代名詞 (Relative Clauses) ---
    "Plants that grow in deserts need water.",
    "The artist who painted this was famous.",
    "Students whose grades are high receive grants.",
    "The method which he used was effective.",
    "An island is land surrounded by water.",

    // --- 不定詞・動名詞 (Infinitives / Gerunds) ---
    "Solving this problem requires a lot of time.",
    "The goal is to increase energy efficiency.",
    "Reading books helps improve your writing skills.",
    "He decided to study international business relations.",
    "Practicing every day is essential for success.",

    // --- 接続詞・副詞節 (Conjunctions / Clauses) ---
    "Although it was raining, the game continued.",
    "Because the ice melted, sea levels rose.",
    "Plants will die unless they get sunlight.",
    "If the temperature drops, the water freezes.",
    "While the sun shines, plants produce food.",

    // --- 助動詞 (Modal Verbs) ---
    "This experiment might yield unexpected results today.",
    "Students must submit their essays by Friday.",
    "The team should focus on data analysis.",
    "Ancient people could predict the lunar eclipse.",
    "Technology may change how we interact daily.",

    // --- 分詞構文・分詞の形容詞的用法 (Participles) ---
    "The boiling point of water is constant.",
    "Broken glass can be dangerous to touch.",
    "Following the rules, the experiment was safe.",
    "Developed countries face unique economic challenges now.",
    "Interest rates, rising slowly, affected the market.",

    // --- 強調構文・仮定法・その他 (Advanced / Academic) ---
    "It is the sun that provides energy.",
    "If I were you, I would study.",
    "Neither the teacher nor the students knew.",
    "The evidence suggests that life existed there.",
    "Psychology explores how the human mind works.",
    "Each participant was given a specific task.",
    "Urbanization lead to significant social changes recently.",
    "The atmosphere protects us from harmful rays.",
    "Success depends on your ability to adapt."
];

    const startBtn = document.getElementById('startBtn');
    const statusDisplay = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const userSpeechDisplay = document.getElementById('userSpeech');
    const correctTextDisplay = document.getElementById('correctText');

    let currentQuestion = "";
    let voices = [];

    // 音声リストを事前ロード
    function loadVoices() {
        voices = window.speechSynthesis.getVoices();
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    startBtn.addEventListener('click', () => {
        currentQuestion = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
        startBtn.disabled = true;
        resultArea.style.display = 'none';
        
        statusDisplay.innerText = "Please listen...";
        statusDisplay.className = "status";
        
        const utterance = new SpeechSynthesisUtterance(currentQuestion);
        
        // --- 優しい声の設定 ---
        // Googleの英語女性の声、またはAppleのSamanthaなど、自然なものを探す
        const preferredVoice = voices.find(v => v.name.includes('Google US English')) || 
                               voices.find(v => v.name.includes('Samantha')) ||
                               voices.find(v => v.lang.startsWith('en-'));
        
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.lang = 'en-US';
        utterance.pitch = 1.25; // 少し高めで明るいトーン
        utterance.rate = 0.85;  // 落ち着いた速度
        // -----------------------

        utterance.onend = () => {
            statusDisplay.innerText = "● Now Repeat!";
            statusDisplay.className = "status recording";
            recognition.start();
        };

        window.speechSynthesis.speak(utterance);
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        calculateScore(transcript);
    };

    recognition.onerror = () => {
        statusDisplay.innerText = "Error: Couldn't hear you.";
        startBtn.disabled = false;
    };

    function calculateScore(userText) {
        statusDisplay.innerText = "Result";
        statusDisplay.className = "status";
        startBtn.disabled = false;

        const target = currentQuestion.toLowerCase().replace(/[.!?,]/g, "");
        const user = userText.toLowerCase().replace(/[.!?,]/g, "");

        const targetWords = target.split(/\s+/);
        const userWords = user.split(/\s+/);
        
        let matches = 0;
        targetWords.forEach(w => {
            if(userWords.includes(w)) matches++;
        });

        const ratio = matches / targetWords.length;
        
        // 1.0 - 6.0 スケール
        let toeflScore = 1.0 + (ratio * 5.0);
        toeflScore = Math.min(6.0, Math.max(1.0, toeflScore));
        
        // 0.5刻みで表示
        const finalDisplayScore = (Math.round(toeflScore * 2) / 2).toFixed(1);

        scoreDisplay.innerText = finalDisplayScore;
        userSpeechDisplay.innerText = userText || "(No speech detected)";
        correctTextDisplay.innerText = currentQuestion;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
